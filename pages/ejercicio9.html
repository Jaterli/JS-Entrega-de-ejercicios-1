<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejercicio 9: Aplicación de lista de tareas con persistencia en LocalStorage">
    <meta name="author" content="Jaterli">
    <title>Ejercicio 9 - Lista de Tareas con LocalStorage | Master Full Stack</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container">
        <header class="exercise-header">
            <h1>Ejercicio 9: Lista de Tareas con LocalStorage</h1>
            <p>Gestiona tus tareas diarias. Las tareas se guardan automáticamente en tu navegador.</p>
        </header>

        <main class="exercise-content">
            <section class="card" aria-label="Formulario para agregar tareas">
                <form id="formularioTarea" class="task-form">
                    <input type="text" 
                           id="tareaInput" 
                           placeholder="Nueva tarea..." 
                           aria-label="Descripción de la nueva tarea"
                           autocomplete="off">
                    
                    <div class="grid-2" role="group" aria-label="Controles de tareas">                           
                        <button type="submit" id="agregarBtn" class="btn" aria-label="Agregar nueva tarea">
                            Agregar tarea
                        </button>
                        <button type="button" id="limpiarBtn" class="btn btn-danger" aria-label="Eliminar todas las tareas completadas">
                            Limpiar completadas
                        </button>
                    </div>
                </form>
            </section>

            <section class="lista-container" aria-label="Lista de tareas">
                <ul id="listaTareas" class="lista" aria-label="Lista de tareas pendientes y completadas"></ul>
            </section>
        </main>

        <nav class="exercise-navigation" aria-label="Navegación entre ejercicios">
            <a href="../index.html" class="back-link" aria-label="Volver al índice principal">
                ← Volver al índice
            </a>
        </nav>
    </div>
    
    <script src="../js/ejercicio9.js"></script>
</body>
</html>
