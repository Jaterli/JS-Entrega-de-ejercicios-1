<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejercicio 2: Aplicación interactiva que cuenta los clics realizados en un botón">
    <meta name="author" content="Jaterli">
    <title>Ejercicio 2 - Contador de Clics | Master Full Stack</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container">
        <header class="exercise-header">
            <h1>Ejercicio 2: Contador de Clics</h1>
            <p>Haz clic en el botón para incrementar el contador</p>
        </header>

        <main class="exercise-content">
            <section class="card text-center" aria-label="Control del contador de clics">
                <button id="contarBtn" class="btn" aria-label="Incrementar contador">Contar clics</button>
                <div id="contador" class="resultado" aria-label="Número de clics realizados" aria-live="polite">0</div>
                <div id="dale" aria-live="polite">¡Empieza a hacer clic!</div>
            </section>
        </main>

        <nav class="exercise-navigation" aria-label="Navegación entre ejercicios">
            <a href="../index.html" class="back-link" aria-label="Volver al índice principal">
                ← Volver al índice
            </a>
        </nav>
    </div>
    
    <script src="../js/ejercicio2.js"></script>
</body>
</html>
