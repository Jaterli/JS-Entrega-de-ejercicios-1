<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejercicio 6: Temporizador interactivo con funciones de iniciar, pausar y reiniciar">
    <meta name="author" content="Jaterli">
    <title>Ejercicio 6 - Temporizador | Master Full Stack</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container">
        <header class="exercise-header">
            <h1>Ejercicio 6: Temporizador</h1>
            <p>
                Controla el tiempo con los botones de iniciar, pausar y reiniciar
            </p>
        </header>

        <main class="exercise-content">
            <section class="card" aria-label="Control del temporizador">
                <div class="temporizador" aria-live="polite" aria-label="Tiempo transcurrido">
                    <span id="horas" aria-label="Horas">00</span>:
                    <span id="minutos" aria-label="Minutos">00</span>:
                    <span id="segundos" aria-label="Segundos">00</span>
                </div>

                <div id="estadoTemporizador" class="estado-temporizador" aria-live="polite" role="status">
                    🔄 Reiniciado
                </div>                
                
                <div class="button-group grid-3" role="group" aria-label="Controles del temporizador">
                    <button id="iniciar" class="btn btn-success" aria-label="Iniciar temporizador">Iniciar</button>
                    <button id="pausar" class="btn btn-warning" aria-label="Pausar temporizador">Pausar</button>
                    <button id="reiniciar" class="btn btn-danger" aria-label="Reiniciar temporizador">Reiniciar</button>
                </div>
            </section>
        </main>

        <nav class="exercise-navigation" aria-label="Navegación entre ejercicios">
            <a href="../index.html" class="back-link" aria-label="Volver al índice principal">
                ← Volver al índice
            </a>
        </nav>
    </div>
    
    <script src="../js/ejercicio6.js"></script>
</body>
</html>
