<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejercicio 8: Herramienta interactiva que cuenta palabras y caracteres sin espacios en tiempo real">
    <meta name="author" content="Jaterli">
    <title>Ejercicio 8 - Contador de Palabras y Caracteres | Master Full Stack</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container">
        <header class="exercise-header">
            <h1>Ejercicio 8: Contador de Palabras y Caracteres</h1>
            <p>Escribe o pega tu texto para ver las estadísticas en tiempo real</p>
        </header>

        <main class="exercise-content">
            <section class="card" aria-label="Contador de texto interactivo">
                <div class="text-input-area">
                    <label for="texto">Área de texto para analizar</label>
                    <textarea 
                        id="texto" 
                        rows="6" 
                        placeholder="Escribe tu texto aquí..." 
                        aria-label="Escribe o pega tu texto para contar palabras y caracteres"
                    ></textarea>
                </div>
                <div class="stats-container" style="margin-top: 15px;" aria-live="polite">
                    <p>
                        <strong>Caracteres (sin espacios):</strong> 
                        <span id="contadorCaracteres" class="stat-value">0</span>
                    </p>
                    <p>
                        <strong>Palabras:</strong> 
                        <span id="contadorPalabras" class="stat-value">0</span>
                    </p>
                </div>
                <div class="text-center" style="margin-top: 15px;">
                    <button id="limpiar" class="btn btn-secondary" value="Limpiar texto" aria-label="Limpiar el área de texto">
                        Limpiar texto
                    </button>
                </div>

            </section>
        </main>

        <nav class="exercise-navigation" aria-label="Navegación entre ejercicios">
            <a href="../index.html" class="back-link" aria-label="Volver al índice principal">
                ← Volver al índice
            </a>
        </nav>
    </div>
    
    <script src="../js/ejercicio8.js"></script>
</body>
</html>
