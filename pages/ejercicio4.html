<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejercicio 4: Filtro de búsqueda en tiempo real para filtrar elementos de una lista dinámicamente">
    <meta name="author" content="Jaterli">
    <title>Ejercicio 4 - Filtro de Búsqueda en Tiempo Real | Master Full Stack</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container">
        <header class="exercise-header">
            <h1>Ejercicio 4: Filtro de Búsqueda en Tiempo Real</h1>
            <p>Escribe en el campo de búsqueda para filtrar los elementos de la lista en tiempo real</p>
        </header>

        <main class="exercise-content">
            <section class="card" aria-label="Filtro de búsqueda">
                <label for="busqueda" class="search-label">
                    Empieza a escribir para filtrar la lista:
                </label>
                <input type="text" 
                       id="busqueda" 
                       class="search-input"
                       placeholder="Buscar..." 
                       autocomplete="off"
                       aria-label="Campo de búsqueda">
            </section>

            <section class="lista-container" aria-label="Lista de elementos">
                <ul id="listaElementos" class="lista"></ul>
                <div id="noResultados" class="no-results" style="display: none;" aria-live="polite">
                    No se encontraron resultados para tu búsqueda
                </div>                
            </section>
        </main>

        <nav class="exercise-navigation" aria-label="Navegación entre ejercicios">
            <a href="../index.html" class="back-link" aria-label="Volver al índice principal">
                ← Volver al índice
            </a>
        </nav>
    </div>
    
    <script src="../js/ejercicio4.js"></script>
</body>
</html>
